services:
  meadow:
    build: .
    ports:
      - "127.0.0.1:34135:34135"
      - "127.0.0.1:34136:34136"
    user: "1000:1000"
    environment:
      - DATA=/data
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - API_TOKEN=${API_TOKEN:-}
      - API_PORT=${API_PORT:-34136}
    volumes:
      - ./data:/data
    restart: unless-stopped